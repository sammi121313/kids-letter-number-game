<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>字母數字快打 60秒</title>
  <style>
    :root{--bg1:#86B6EE;--bg2:#77A9E3;--ok:#67C46A;--bad:#E46A86;--ink:#2E4F86}
    *{box-sizing:border-box} body{margin:0;font-family:"Noto Sans TC",system-ui;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--ink)}
    .wrap{max-width:980px;margin:0 auto;padding:14px}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.card{background:#EAF3FF;border:1px solid #9EC1ED;border-radius:14px;padding:10px;text-align:center;font-weight:700;box-shadow:0 2px 8px #204b8f2b}
    .card b{display:block;font-size:1.6rem;color:#3769A8}
    .target{margin:12px 0;background:#EAF3FF;border:1px solid #9EC1ED;border-radius:18px;padding:12px;text-align:center;box-shadow:0 2px 8px #204b8f2b}
    .char{font-size:120px;line-height:1;font-weight:900;text-shadow:0 4px 0 #0003}
    .hint{font-size:22px;font-weight:800}
    .feedback{height:38px;text-align:center;font-size:28px;font-weight:900}
    .ok{color:var(--ok)} .bad{color:var(--bad)}
    .actions{display:flex;justify-content:center;gap:10px;margin:8px 0 12px}
    button{border:0;border-radius:12px;padding:10px 16px;font-size:18px;font-weight:800;cursor:pointer}
    .primary{background:#EE8CC8;color:#fff}
    .layout{background:#EAF3FF;border:1px solid #9EC1ED;border-radius:16px;padding:10px}
    .row{display:flex;gap:8px;justify-content:center;margin:8px 0;flex-wrap:wrap}
    .key{width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#2E4F86;background:#DCEBFF;box-shadow:0 2px 0 #88AEDD}
    .rainbow-0{background:#F7B2DA}.rainbow-1{background:#F09BCC}.rainbow-2{background:#FFD0E8}.rainbow-3{background:#A5D98B}.rainbow-4{background:#89C7F0}.rainbow-5{background:#7FB0E7}.rainbow-6{background:#6E9DD9}.rainbow-7{background:#9BC7EA}
    .active{outline:4px solid #EE8CC8;transform:scale(1.08)}
    .history{margin-top:10px;background:#EAF3FF;border:1px solid #9EC1ED;border-radius:12px;padding:10px}
    .small{font-size:13px;opacity:.9}
    @media (max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}.char{font-size:86px}.key{width:44px;height:44px}}
  </style>
</head>
<body>
<div class="wrap">
  <h2>🌈 字母數字快打 60秒</h2>
  <div class="stats">
    <div class="card">⏱ 剩餘<b id="time">60</b></div>
    <div class="card">⭐ 分數<b id="score">0</b></div>
    <div class="card">✅ 答對<b id="hit">0</b></div>
    <div class="card">❌ 答錯<b id="miss">0</b></div>
    <div class="card">🏆 最高<b id="best">0</b></div>
  </div>

  <div class="target">
    <div class="char" id="target">A</div>
    <div class="hint" id="speakText">A</div>
  </div>
  <div class="feedback" id="fb"></div>
  <div class="actions">
    <button class="primary" id="startBtn">開始遊戲</button>
    <button id="restartBtn">重新開始</button>
  </div>

  <div class="layout" id="kbd"></div>

  <div class="history">
    <b>最近 10 局</b>
    <div id="history" class="small"></div>
  </div>
</div>

<script>
const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
const numMap={0:'zero',1:'one',2:'two',3:'three',4:'four',5:'five',6:'six',7:'seven',8:'eight',9:'nine'};
const rows=[['1','2','3','4','5','6','7','8','9','0'],['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M']];
const el={time:time,score:score,hit:hit,miss:miss,best:best,target:target,fb:fb,speakText:speakText,history:history,kbd:kbd};
let st={playing:false,timer:60,score:0,hit:0,miss:0,target:'A',it:null};
let speechQueue=[];
let speaking=false;

function buildKeyboard(){el.kbd.innerHTML='';rows.forEach((r,ri)=>{const row=document.createElement('div');row.className='row';r.forEach((k,i)=>{const b=document.createElement('button');b.className=`key rainbow-${(i+ri)%8}`;b.dataset.k=k;b.textContent=k;b.onclick=()=>onInput(k);row.appendChild(b)});el.kbd.appendChild(row)});}
function setStat(){el.time.textContent=st.timer;el.score.textContent=st.score;el.hit.textContent=st.hit;el.miss.textContent=st.miss;el.best.textContent=localStorage.getItem('kids_best')||0;}
function pick(){st.target=CHARS[Math.floor(Math.random()*CHARS.length)];el.target.textContent=st.target;el.speakText.textContent=`請按：${st.target}`;highlight();speak(st.target)}
function highlight(){document.querySelectorAll('.key').forEach(k=>k.classList.toggle('active',k.dataset.k===st.target));}
function tone(ac,freq,start,dur,type='square',vol=.12){const o=ac.createOscillator();const g=ac.createGain();o.type=type;o.frequency.value=freq;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(vol,start);g.gain.exponentialRampToValueAtTime(0.001,start+dur);o.start(start);o.stop(start+dur)}
function sfxCoin(){const ac=new (window.AudioContext||window.webkitAudioContext)();const t=ac.currentTime+0.01; tone(ac,988,t,0.06,'triangle',.11); tone(ac,1319,t+0.06,0.06,'triangle',.11); tone(ac,1568,t+0.12,0.08,'triangle',.11); setTimeout(()=>ac.close(),350)}
function sfxWrong(){const ac=new (window.AudioContext||window.webkitAudioContext)();const t=ac.currentTime+0.01; tone(ac,220,t,0.08,'sawtooth',.10); tone(ac,170,t+0.08,0.10,'sawtooth',.10); setTimeout(()=>ac.close(),300)}
function pickVoice(){
  const vs=window.speechSynthesis?.getVoices?.()||[];
  return vs.find(v=>v.lang?.startsWith('en') && /Samantha|Karen|Moira|Ava|Google US English/i.test(v.name))
      || vs.find(v=>v.lang?.startsWith('en'))
      || null;
}
function speakNow(text){
  if(!('speechSynthesis' in window)) return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';
  u.rate=0.82; // 稍慢避免前段咬字不清
  u.pitch=1.05;
  u.volume=1;
  const v=pickVoice(); if(v) u.voice=v;
  u.onend=()=>{speaking=false; if(speechQueue.length) speakNow(speechQueue.shift());};
  speaking=true;
  window.speechSynthesis.speak(u);
}
function speak(ch){
  const text=/\d/.test(ch)?numMap[ch]:ch.toLowerCase();
  if(speaking){ speechQueue.push(text); return; }
  speakNow(text);
}
function onInput(k){if(!st.playing)return; if(k===st.target){st.score+=10;st.hit++;el.fb.textContent='太棒了！';el.fb.className='feedback ok';sfxCoin();pick();} else {st.score=Math.max(0,st.score-2);st.miss++;el.fb.textContent='再試一次';el.fb.className='feedback bad';sfxWrong();} setStat();}
function saveResult(){const best=Math.max(Number(localStorage.getItem('kids_best')||0),st.score);localStorage.setItem('kids_best',String(best));const list=JSON.parse(localStorage.getItem('kids_hist')||'[]');const rate=st.hit+st.miss?Math.round(st.hit*100/(st.hit+st.miss)):0;list.unshift({t:new Date().toLocaleString('zh-TW'),s:st.score,r:rate});localStorage.setItem('kids_hist',JSON.stringify(list.slice(0,10)));}
function renderHistory(){const list=JSON.parse(localStorage.getItem('kids_hist')||'[]');el.history.innerHTML=list.map((x,i)=>`${i+1}. ${x.t}｜${x.s}分｜命中率 ${x.r}%`).join('<br>')||'尚無紀錄';}
function endGame(){clearInterval(st.it);st.playing=false;saveResult();setStat();renderHistory();el.fb.textContent=`時間到！本局 ${st.score} 分`;el.fb.className='feedback ok';speechQueue=[];speaking=false;window.speechSynthesis?.cancel();speakNow('good job');}
function start(){clearInterval(st.it);st={...st,playing:true,timer:60,score:0,hit:0,miss:0};speechQueue=[];speaking=false;window.speechSynthesis?.cancel();setStat();pick();el.fb.textContent='';st.it=setInterval(()=>{st.timer--;setStat();if(st.timer<=0)endGame();},1000)}

document.addEventListener('keydown',e=>{const k=e.key.toUpperCase();if(CHARS.includes(k))onInput(k)});
startBtn.onclick=start; restartBtn.onclick=start;
buildKeyboard(); setStat(); renderHistory(); pick();
</script>
</body>
</html>
